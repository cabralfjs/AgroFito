name: AgroFito — Actualizar todos os dados

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install playwright openpyxl
          playwright install chromium --with-deps

      - name: Actualizar Condições de Utilização (4 tabelas)
        run: python update_sifito.py

      - name: Actualizar Produtos Fitofarmacêuticos (4 tabelas)
        run: python update_produtos.py

      - name: Commit e push (se houver mudanças)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data_autorizadas.json \
            data_canceladas_venda_permitida.json \
            data_canceladas_venda_interdita_util_permitida.json \
            data_canceladas_venda_util_interditas.json \
            prod_autorizadas.json \
            prod_canceladas_venda_permitida.json \
            prod_canceladas_venda_interdita_util_permitida.json \
            prod_canceladas_venda_util_interditas.json
          if git diff --staged --quiet; then
            echo "Sem alterações — nada a fazer."
          else
            HOJE=$(date +'%d/%m/%Y')
            git commit -m "🌿 AgroFito — dados actualizados $HOJE"
            git push
          fi
